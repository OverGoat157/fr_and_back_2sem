events {}

http {
    upstream backend {
        # max_fails: после 2 неудачных попыток за fail_timeout сервер исключается
        # fail_timeout: на сколько секунд исключить упавший сервер
        server 127.0.0.1:3000 max_fails=2 fail_timeout=30s;
        server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
        server 127.0.0.1:3002 backup;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }
    }
}
